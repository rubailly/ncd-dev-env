worker_processes  1;
user              nobody;

events {
  worker_connections  1024;
  multi_accept        off;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  tcp_nopush    on;
  tcp_nodelay   on;
  sendfile      on;

  keepalive_timeout  65;

  map $http_user_agent $loggable {
    default 1;
    "~Blackbox-Exporter" 0;
  }

  access_log /var/log/nginx/access.log combined if=$loggable;

  server {
    listen  80;
    root    /usr/share/nginx/html;
    index   index.html;

    # Strip the /openmrs/spa prefix — SPA assets live at the document root
    rewrite ^/openmrs/spa(/.+)$ $1 last;
    rewrite ^/openmrs/spa/?$    /index.html last;

    # Proxy all /openmrs/ API/backend requests to the OpenMRS backend container
    location /openmrs/ {
        proxy_pass http://openmrs:8080/openmrs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # never cache the service-worker
    location ~* service-worker\.js$ {
      expires -1d;
      try_files $uri =404;
    }

    location ~* (\.js|openmrs\.(\w*\.)?css)$ {
      expires 1y;
      try_files $uri =404;
    }

    # handle anything with a "." that's not an HTML file
    location ~* \.(?!html?)[^.]+$ {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files $uri =404;
    }

    # any other URL should serve the single page
    location / {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files /index.html =404;
    }
  }
}
